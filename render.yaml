services:
  - type: web
    name: threat-radar-mcp
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: pnpm install && pnpm --filter @workspace/radar-core build && pnpm --filter @workspace/mcp-foundation build && pnpm --filter @workspace/signal-atproto build && pnpm --filter @riatzukiza/threat-radar-mcp build
    startCommand: cd services/threat-radar-mcp && node --env-file-if-exists=.env dist/main.js
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: threat-radar-db
          property: connectionString
      - key: ADMIN_AUTH_KEY
        sync: false
      - key: ALLOW_UNAUTH_LOCAL
        value: "false"
      - key: PUBLIC_BASE_URL
        sync: false

  - type: web
    name: threat-radar-web
    runtime: static
    plan: free
    rootDir: services/threat-radar-web
    buildCommand: cd ../.. && pnpm install && pnpm --filter @workspace/radar-core build && pnpm --filter @workspace/signal-embed-browser build && cd services/threat-radar-web && npx vite build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: VITE_API_URL
        sync: false

databases:
  - name: threat-radar-db
    databaseName: threat_radar
    plan: free
    region: oregon
